<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - HexaShop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/font-awesome.css">
  <link rel="stylesheet" href="assets/css/templatemo-hexashop.css">
  <link rel="stylesheet" href="assets/css/owl-carousel.css">
  <link rel="stylesheet" href="assets/css/lightbox.css">
</head>
<body>

<!-- Header -->
<header class="header-area header-sticky">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <nav class="main-nav">
          <a href="index.html" class="logo"><img src="assets/images/logo.png" alt=""></a>
          <ul class="nav">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
          </ul>
          <a class='menu-trigger'><span>Menu</span></a>
        </nav>
      </div>
    </div>
  </div>
</header>

<!-- Page Content -->
<div class="page-heading" style="padding: 120px 0 60px;">
  <div class="container">
    <h2 class="text-center">User Login</h2>
  </div>
</div>

<section class="section" style="padding-top: 0;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <form action="login" method="post">
          <div class="form-group">
            <label>Username</label>
            <input type="text" class="form-control" name="username" required />
          </div>
          <div class="form-group mt-3">
            <label>Password</label>
            <input type="password" class="form-control" name="password" required />
          </div>
          <div class="mt-4">
            <button type="submit" class="btn btn-outline-primary w-100">Login</button>
          </div>
          <p class="mt-3 text-center">Don't have an account? <a href="register.html">Register here</a></p>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer>
  <div class="container">
    <p class="text-center mt-5">Copyright © 2025 HexaShop.</p>
  </div>
</footer>

</body>
</html>
